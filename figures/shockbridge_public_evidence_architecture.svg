<svg width="1200" height="680" viewBox="0 0 1200 680" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="680" fill="#0b1020"/>
  <text x="600" y="58" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#ffffff">
    ShockBridge Research Lab
  </text>
  <text x="600" y="92" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#b8c2d8">
    Public Evidence Architecture for Macro-Financial Shock Transmission Research
  </text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#9fb7ff"/>
    </marker>
    <filter id="soft">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <g font-family="Arial, Helvetica, sans-serif" filter="url(#soft)">
    <rect x="70" y="170" rx="22" ry="22" width="190" height="105" fill="#111a33" stroke="#5f7cff" stroke-width="2"/>
    <text x="165" y="207" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">Shock Origin</text>
    <text x="165" y="235" text-anchor="middle" font-size="13" fill="#c8d3ef">macro, rates, FX,</text>
    <text x="165" y="254" text-anchor="middle" font-size="13" fill="#c8d3ef">commodities, volatility</text>

    <rect x="330" y="170" rx="22" ry="22" width="210" height="105" fill="#111a33" stroke="#5f7cff" stroke-width="2"/>
    <text x="435" y="207" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">Transmission Layer</text>
    <text x="435" y="235" text-anchor="middle" font-size="13" fill="#c8d3ef">cross-market channels,</text>
    <text x="435" y="254" text-anchor="middle" font-size="13" fill="#c8d3ef">dependence, co-movement</text>

    <rect x="610" y="170" rx="22" ry="22" width="210" height="105" fill="#111a33" stroke="#5f7cff" stroke-width="2"/>
    <text x="715" y="207" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">Regime Diagnostics</text>
    <text x="715" y="235" text-anchor="middle" font-size="13" fill="#c8d3ef">stress-building, regime</text>
    <text x="715" y="254" text-anchor="middle" font-size="13" fill="#c8d3ef">change, structural pressure</text>

    <rect x="890" y="170" rx="22" ry="22" width="230" height="105" fill="#111a33" stroke="#5f7cff" stroke-width="2"/>
    <text x="1005" y="207" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">Validation Discipline</text>
    <text x="1005" y="235" text-anchor="middle" font-size="13" fill="#c8d3ef">walk-forward logic, leakage</text>
    <text x="1005" y="254" text-anchor="middle" font-size="13" fill="#c8d3ef">control, robustness checks</text>
  </g>

  <line x1="260" y1="222" x2="330" y2="222" stroke="#9fb7ff" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="540" y1="222" x2="610" y2="222" stroke="#9fb7ff" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="820" y1="222" x2="890" y2="222" stroke="#9fb7ff" stroke-width="3" marker-end="url(#arrow)"/>

  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="165" y="390" rx="28" ry="28" width="870" height="135" fill="#10182f" stroke="#2f4ea8" stroke-width="2"/>
    <text x="600" y="432" text-anchor="middle" font-size="24" font-weight="700" fill="#ffffff">Public Evidence Layer</text>
    <text x="600" y="466" text-anchor="middle" font-size="15" fill="#c8d3ef">methodology notes · public/private boundary · data-source philosophy · validation mindset · sanitized research snapshot</text>
    <text x="600" y="497" text-anchor="middle" font-size="14" fill="#9fb0d0">Private thresholds, weights, proprietary diagnostics, and action rules are intentionally not disclosed.</text>
  </g>

  <line x1="1005" y1="275" x2="1005" y2="345" stroke="#9fb7ff" stroke-width="3"/>
  <line x1="1005" y1="345" x2="600" y2="390" stroke="#9fb7ff" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="600" y="606" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#94a3c7">
    Rodolfo Pereira · www.shockbridgepulse.com · rolffcoelho@hotmail.com
  </text>
